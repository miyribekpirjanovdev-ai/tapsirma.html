<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Forma Mısalı</title>
</head>
<body>

<form>

   
    <fieldset>
        <legend>Jeke maǵluwmatlar</legend>

        <label>Atı:</label><br>
        <input type="text" name="name"><br><br>

        <label>Familiyası:</label><br>
        <input type="text" name="surname"><br><br>

        <label>Telefon:</label><br>
        <input type="tel" name="phone"><br><br>

    </fieldset>

    <br>

   
    <fieldset>
        <legend>Mámleket tanlaw</legend>

        <label>Mámleketti tańlań:</label><br>
        <select name="country">
            <option value="france">Fransiya</option>
            <option value="usa">USA (AQSH)</option>
            <option value="russia">Rossiya</option>
            <option value="uzbekistan">O'zbekiston</option>
        </select>

    </fieldset>

    <br>

   
    <fieldset>
        <legend>Qosımsha maǵluwmat</legend>

        <label>Kommentariya jazıń:</label><br>
        <textarea name="comment" rows="5" cols="40"></textarea>

    </fieldset>

    <br>

    <input type="submit" value="Jiberiw">

</form>

</body>
          </html>
