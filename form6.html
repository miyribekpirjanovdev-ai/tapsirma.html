<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Input túrleri mısalı</title>
</head>
<body>

<h2>Forma mısalı</h2>

<form>

  
    Atıńız: <br>
    <input type="text" name="name"><br><br>

  
    Parol: <br>
    <input type="password" name="password"><br><br>


    Email: <br>
    <input type="email" name="email"><br><br>

  
    Jasınız: <br>
    <input type="number" name="age"><br><br>

   
    Jańa reń tańlań: <br>
    <input type="color" name="color"><br><br>

 
    Tuılǵan kún: <br>
    <input type="date" name="birthdate"><br><br>

 
    Waqıt tańlań: <br>
    <input type="time" name="time"><br><br>

  
    Qızıǵıwlar: <br>
    <input type="checkbox" name="hobby" value="sport"> Sport <br>
    <input type="checkbox" name="hobby" value="music"> Music <br>
    <input type="checkbox" name="hobby" value="reading"> Kitap oqıw <br><br>

  
    Jınıs: <br>
    <input type="radio" name="gender" value="male"> Erkek <br>
    <input type="radio" name="gender" value="female"> Ayal <br><br>

  
    Fayl júkleń: <br>
    <input type="file" name="file"><br><br>

 
    <input type="hidden" name="user_id" value="12345">

   
    <input type="submit" value="Jiberiw">

  
    <input type="reset" value="Tazalaw">

</form>

</body>
</html>
